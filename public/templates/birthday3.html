<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✨ Your Magical Surprise · Greeter.com</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pink-start: #ff758c;
      --pink-end: #ff7eb3;
      --rose-gold: #e6a4b4;
      --soft-peach: #ffd6c9;
      --warm-blush: #ffc2d1;
      --glow-pink: rgba(255, 182, 193, 0.5);
      --bg-dark-1: #1a0f14;
      --bg-dark-2: #2b1620;
      --bg-dark-3: #000000;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, var(--bg-dark-1) 0%, var(--bg-dark-2) 70%, var(--bg-dark-3) 100%);
      color: #fff0f3;
      min-height: 100vh;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* floating hearts background */
    .floating-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      color: rgba(255, 192, 203, 0.5);
      font-size: 1.6rem;
      animation: floatHeart 16s infinite ease-in-out;
      filter: drop-shadow(0 0 12px #ffb6c1);
      user-select: none;
    }

    @keyframes floatHeart {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-20vh) rotate(20deg); opacity: 0; }
    }

    /* content above floating elements */
    .content {
      position: relative;
      z-index: 10;
    }

    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    /* glassmorphism card */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 48px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 45px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,182,193,0.1), 0 0 45px var(--glow-pink);
      max-width: 950px;
      width: 100%;
      transition: transform 0.3s ease;
    }

    @media (min-width: 640px) {
      .glass-card { padding: 3rem 3.5rem; }
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .glow-text {
      background: linear-gradient(135deg, #ffd6c9, #ffb6c1, #ff9eb5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 25px var(--glow-pink), 0 0 55px rgba(255,120,140,0.6);
      animation: softPulse 5s infinite alternate;
    }

    @keyframes softPulse {
      0% { text-shadow: 0 0 15px #ffb6c1, 0 0 35px #ff9eb5; }
      100% { text-shadow: 0 0 30px #ffc2d1, 0 0 65px #ff7eb3; }
    }

    .hero-title {
      font-size: clamp(3.2rem, 10vw, 5.5rem);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .hero-sub {
      font-size: 1.5rem;
      font-weight: 300;
      color: #ffe4ec;
      text-shadow: 0 0 15px #e6a4b4;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .gallery-item {
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 15px 30px -5px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,182,193,0.3);
      transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1);
      cursor: pointer;
      aspect-ratio: 4/5;
      background: #2b1620;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s;
    }

    .gallery-item:hover {
      transform: scale(1.02);
      box-shadow: 0 0 35px var(--glow-pink), 0 0 60px #ff7eb366;
      border: 1px solid #ffb6c1;
    }

    .gallery-item:hover img {
      transform: scale(1.08);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 5, 8, 0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      max-width: 85vw;
      max-height: 85vh;
      border-radius: 40px;
      box-shadow: 0 0 70px #ffb6c180;
      border: 2px solid #ffc2d1;
    }

    .modal-close {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 3rem;
      color: #ffe4ec;
      cursor: pointer;
      filter: drop-shadow(0 0 10px hotpink);
    }

    .btn {
      background: linear-gradient(145deg, #ffb6c1, #ff9eb5);
      border: none;
      color: #1a0f14;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 60px;
      font-size: 1.2rem;
      box-shadow: 0 10px 25px #00000050, 0 0 30px #ffb6c1;
      backdrop-filter: blur(5px);
      transition: 0.3s;
      border: 1px solid #ffe4ec;
      cursor: pointer;
      margin-top: 30px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 45px #ffb6c1;
    }

    .music-toggle {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 1px solid #ffb6c1;
      color: #ffd6c9;
      border-radius: 60px;
      padding: 12px 20px;
      z-index: 100;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 25px #ffb6c180;
    }

    .caption-text {
      font-size: 1rem;
      margin-top: 10px;
      color: #ffd6c9;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(35px);
      transition: opacity 0.9s cubic-bezier(0.2,0.9,0.3,1), transform 0.9s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .heartbeat {
      animation: heartbeatPulse 2s infinite;
    }

    @keyframes heartbeatPulse {
      0%,100%{ transform:scale(1); }
      15%{ transform:scale(1.06); }
      30%{ transform:scale(1); }
      45%{ transform:scale(1.04); }
    }

    /* responsive */
    @media (max-width: 600px) {
      .glass-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- floating hearts background -->
<div class="floating-bg" id="floatingHeartsContainer"></div>

<!-- music toggle -->
<div class="music-toggle" id="musicToggle">
  <i class="fas fa-music"></i> <span id="musicText">Play music</span>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_1f3e8a3d7e.mp3" type="audio/mpeg">
</audio>

<div class="content">

  <!-- HERO SECTION -->
  <section id="hero">
    <div class="glass-card fade-up visible">
      <h1 class="hero-title glow-text" id="heroTitle">Happy Celebration ❤️</h1>
      <p class="hero-sub" id="heroSub">Every moment with you is magic</p>
      <div style="margin-top: 20px; font-size: 1.3rem; opacity: 0.9;" id="heroMeta"></div>
      <div style="margin-top: 10px; font-size: 2.5rem;" class="heartbeat">❤️</div>
    </div>
  </section>

  <!-- LOVE MESSAGE / STORY -->
  <section id="storySection">
    <div class="glass-card fade-up">
      <h2 class="glow-text" style="font-size: 2.8rem; margin-bottom: 25px;">💌 Our Story</h2>
      <p style="font-size: 1.4rem; line-height: 1.7; font-weight: 300;" id="storyText"></p>
    </div>
  </section>

  <!-- WISHES SECTION -->
  <section id="wishesSection">
    <div class="glass-card fade-up">
      <h2 class="glow-text" style="font-size: 2.8rem; margin-bottom: 25px;">✨ Special Wishes</h2>
      <p style="font-size: 1.4rem; line-height: 1.7; font-weight: 300;" id="wishesText"></p>
    </div>
  </section>

  <!-- GALLERY SECTION (if memories exist) -->
  <section id="gallerySection" style="display: none;">
    <h2 class="glow-text" style="font-size: 3rem; margin-bottom: 20px;">🌸 Precious Memories</h2>
    <div class="gallery-grid" id="galleryContainer"></div>
  </section>

  <!-- INTERACTIVE GIFT / SURPRISE -->
  <section id="giftSection">
    <div class="glass-card fade-up" style="text-align: center;">
      <h2 class="glow-text" style="font-size: 2.5rem;">🎁 A Little Surprise</h2>
      <div style="margin: 25px 0;">
        <div style="background: linear-gradient(145deg, #e6a4b4, #ffb6c1); padding: 1.8rem 2.5rem; border-radius: 60px; display: inline-block; box-shadow: 0 0 50px #ffb6c1aa; cursor: pointer;" id="giftBox">
          <i class="fas fa-gift" style="font-size: 4rem; color: #2e0f17;"></i>
          <p style="margin-top: 10px; font-weight: 600;">Click to open</p>
        </div>
      </div>
      <div id="giftMessage" style="display: none; font-size: 2rem; color: #fff0f5; text-shadow: 0 0 25px hotpink;">
        <i class="fas fa-heart"></i> You are my everything <i class="fas fa-heart"></i>
      </div>
    </div>
  </section>

  <!-- FINAL SECTION -->
  <section id="finale">
    <div class="glass-card fade-up">
      <h1 class="glow-text" style="font-size: 3.5rem;">Forever & Always <i class="fas fa-heart"></i></h1>
      <p style="font-size: 1.6rem; margin: 30px 0;">Here's to our beautiful journey</p>
      <button class="btn" id="replayBtn"><i class="fas fa-undo-alt"></i> Replay the Magic</button>
    </div>
  </section>

</div>

<!-- Modal for image -->
<div class="modal" id="imageModal">
  <span class="modal-close" id="closeModal">&times;</span>
  <img class="modal-content" id="modalImage" src="" alt="memory">
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script>
  (function(){
    "use strict";

    // ---------- LOAD USER DATA ----------
    const userData = JSON.parse(localStorage.getItem("userData") || "{}");
    
    const eventType = userData.event || 'birthday';
    const mood = userData.mood || 'romantic';
    const name = userData.name || 'Loved One';
    const age = userData.age || '';
    const story = userData.story || 'A beautiful story waiting to be written...';
    const wishes = userData.wishes || 'May your days be filled with love and joy.';
    const memories = userData.memories || [];

    // Helper to get event display name
    function getEventDisplay(eventKey) {
      const map = {
        'birthday': 'Birthday',
        'proposal': 'Proposal',
        'anniversary': 'Anniversary',
        'festival': 'Festival'
      };
      return map[eventKey] || 'Celebration';
    }

    const eventDisplay = getEventDisplay(eventType);
    const ageSuffix = age ? ` · ${age} years young` : '';

    // Update hero
    document.getElementById('heroTitle').innerHTML = `Happy ${eventDisplay} ${name} <i class="fas fa-heart" style="color: #ff9eb5;"></i>`;
    document.getElementById('heroSub').innerHTML = mood === 'roast' ? 'You’re still my favorite weirdo 😜' : 'Every moment with you is magic';
    document.getElementById('heroMeta').innerHTML = `${name}${ageSuffix} · ${eventDisplay}`;
    
    document.getElementById('storyText').innerHTML = story.replace(/\n/g, '<br>');
    document.getElementById('wishesText').innerHTML = wishes.replace(/\n/g, '<br>');

    // Gallery
    const gallerySection = document.getElementById('gallerySection');
    const galleryContainer = document.getElementById('galleryContainer');
    if (memories.length > 0) {
      gallerySection.style.display = 'block';
      memories.forEach((mem, idx) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `
          <img src="${mem.img}" alt="memory ${idx+1}" loading="lazy">
          ${mem.text ? `<div class="caption-text">${mem.text}</div>` : ''}
        `;
        item.addEventListener('click', () => openModal(mem.img));
        galleryContainer.appendChild(item);
      });
    } else {
      gallerySection.style.display = 'none';
    }

    // Modal
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    function openModal(src) {
      modal.classList.add('active');
      modalImg.src = src;
    }
    document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    window.addEventListener('keydown', (e) => { if(e.key==='Escape') modal.classList.remove('active'); });

    // Floating hearts
    const heartsContainer = document.getElementById('floatingHeartsContainer');
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerHTML = ['❤️','🌸','✨','💖','💗','💓'][Math.floor(Math.random()*6)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDuration = (12 + Math.random() * 10) + 's';
      heart.style.fontSize = (1.4 + Math.random() * 2) + 'rem';
      heartsContainer.appendChild(heart);
      setTimeout(() => heart.remove(), 22000);
    }
    setInterval(createHeart, 1800);
    for(let i=0;i<10;i++) setTimeout(createHeart, i*200);

    // Gift box
    const giftBox = document.getElementById('giftBox');
    const giftMessage = document.getElementById('giftMessage');
    let giftOpened = false;
    giftBox.addEventListener('click', () => {
      if (giftOpened) return;
      giftOpened = true;
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffb6c1', '#ff9eb5', '#ffe4ec'] });
      confetti({ particleCount: 120, spread: 70, origin: { y: 0.5, x: 0.3 } });
      confetti({ particleCount: 120, spread: 70, origin: { y: 0.5, x: 0.7 } });
      giftMessage.style.display = 'block';
      giftBox.style.transform = 'scale(0.98)';
      // extra floating hearts
      for(let i=0;i<15;i++) setTimeout(createHeart, i*50);
    });

    // Replay button: scroll to top + confetti
    document.getElementById('replayBtn').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
    });

    // Music toggle
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const musicText = document.getElementById('musicText');
    let musicPlaying = false;
    musicToggle.addEventListener('click', () => {
      if (!musicPlaying) {
        bgMusic.volume = 0.2;
        bgMusic.play().then(() => {
          musicPlaying = true;
          musicText.innerText = 'Pause music';
          musicToggle.innerHTML = '<i class="fas fa-pause"></i> Pause music';
        }).catch(() => {});
      } else {
        bgMusic.pause();
        musicPlaying = false;
        musicText.innerText = 'Play music';
        musicToggle.innerHTML = '<i class="fas fa-music"></i> Play music';
      }
    });
    // autoplay attempt on first interaction
    document.body.addEventListener('click', function initMusic() {
      if (bgMusic.paused && !musicPlaying) {
        bgMusic.play().then(() => {
          musicPlaying = true;
          musicText.innerText = 'Pause music';
          musicToggle.innerHTML = '<i class="fas fa-pause"></i> Pause music';
        }).catch(()=>{});
      }
    }, { once: true });

    // Intersection Observer for fade-up
    const fadeElements = document.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.2, rootMargin: '0px' });
    fadeElements.forEach(el => observer.observe(el));
    
    // Additional micro interactions: click heart burst
    document.body.addEventListener('click', (e) => {
      const x = e.clientX;
      const y = e.clientY;
      for(let i=0; i<8; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.style.position = 'fixed';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.fontSize = '2rem';
        heart.style.pointerEvents = 'none';
        heart.style.zIndex = '9999';
        heart.style.filter = 'drop-shadow(0 0 15px #ffb6c1)';
        heart.style.animation = 'burstPop 1.2s forwards';
        const angle = (i * 45) * Math.PI/180;
        const distance = 60 + Math.random()*100;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        heart.style.setProperty('--dx', dx+'px');
        heart.style.setProperty('--dy', dy+'px');
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1100);
      }
    });

    // Add keyframes dynamically
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes burstPop {
        0% { opacity: 1; transform: scale(0.3) translate(0,0); }
        100% { opacity: 0; transform: scale(1.5) translate(var(--dx), var(--dy)); }
      }
    `;
    document.head.appendChild(styleSheet);

    console.log('✨ Personalized surprise for', name);
  })();
</script>

<!-- extra style for caption -->
<style>
  .caption-text {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    padding: 8px;
    text-align: center;
    border-radius: 0 0 30px 30px;
  }
  .gallery-item { position: relative; }
  .floating-heart { will-change: transform; }
  .btn, .music-toggle, #giftBox { cursor: pointer; }
</style>

</body>
</html>
