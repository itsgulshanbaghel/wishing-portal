<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💍 Will You Marry Me? · A Love Story</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Cinzel:wght@400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose: #c9184a;
            --rose-light: #ff4d6d;
            --gold: #d4af37;
            --gold-light: #f5e2a0;
            --cream: #fef7e6;
            --dark: #0a0306;
            --dark-soft: #1e0b12;
            --glass-bg: rgba(10, 3, 6, 0.55);
            --glass-border: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--dark);
            color: var(--cream);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* dynamic background with radial glow and subtle noise */
        .bg-ambient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 40% 30%, #3d001f 0%, #0a0306 80%);
            z-index: -2;
        }

        .bg-ambient::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.3;
            pointer-events: none;
        }

        /* floating sparkles canvas */
        #sparkleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 70px;
        }

        /* ring pulse + floating */
        .ring-levitation {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .ring-levitation:hover {
            transform: scale(1.05);
        }

        .ring-wrapper {
            position: relative;
            display: inline-block;
        }

        .ring-glow {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4), transparent 70%);
            animation: pulseRing 2.2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(0.9);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .ring-emoji {
            font-size: 95px;
            display: block;
            filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.7));
            animation: floatRing 3s ease-in-out infinite;
        }

        @keyframes floatRing {

            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }

            50% {
                transform: translateY(-12px) rotate(3deg);
            }
        }

        /* elegant glass cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .glass-card:hover {
            box-shadow: 0 30px 50px rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .overture {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 5.2rem);
            font-weight: 400;
            color: var(--gold-light);
            text-align: center;
            line-height: 1.2;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .name-line {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold-light), var(--rose-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: center;
            margin: 24px auto;
            width: 80%;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .divider-icon {
            color: var(--rose-light);
            font-size: 1.2rem;
        }

        .proposal-message {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-style: italic;
            line-height: 1.8;
            text-align: center;
            color: rgba(254, 247, 230, 0.9);
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-yes,
        .btn-no {
            padding: 14px 44px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.25s;
            font-weight: 600;
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--rose), #6e0020);
            border: 1px solid var(--gold);
            color: var(--cream);
            box-shadow: 0 0 15px rgba(201, 24, 74, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #e02458, #8a0028);
        }

        .btn-no {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: var(--gold-light);
        }

        .btn-no:hover {
            border-color: var(--rose);
            color: var(--rose-light);
            transform: translateY(-2px);
        }

        /* timeline styling */
        .timeline-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 20px;
        }

        .timeline-node {
            display: flex;
            gap: 24px;
            align-items: baseline;
            border-left: 2px solid var(--gold);
            padding-left: 24px;
            position: relative;
            transition: transform 0.2s;
        }

        .timeline-node:hover {
            transform: translateX(6px);
        }

        .timeline-node::before {
            content: "✦";
            position: absolute;
            left: -12px;
            top: 0;
            color: var(--gold);
            background: var(--dark);
            padding: 0 4px;
        }

        .timeline-year {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--gold);
            min-width: 110px;
            font-weight: 600;
        }

        .timeline-desc {
            font-size: 1rem;
            font-style: italic;
            line-height: 1.5;
        }

        /* reasons flip cards enhanced */
        .reasons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 28px;
            margin-top: 16px;
        }

        .flip-card {
            background: transparent;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 200px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 24px;
        }

        .flip-card:hover .flip-inner {
            transform: rotateY(180deg);
        }

        .flip-front,
        .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .flip-front {
            background: rgba(201, 24, 74, 0.2);
            border: 1px solid var(--rose);
            backdrop-filter: blur(4px);
        }

        .flip-front i {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .flip-back {
            background: linear-gradient(145deg, var(--rose), #4f0018);
            transform: rotateY(180deg);
            color: var(--cream);
            font-style: italic;
        }

        /* gallery - elegant polaroid style */
        .gallery-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            margin: 20px 0 10px;
        }

        .memory-polaroid {
            background: rgba(255, 245, 235, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px;
            width: 170px;
            transition: all 0.25s;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .memory-polaroid:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
        }

        .polaroid-img {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }

        .polaroid-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .polaroid-caption {
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
            color: var(--gold-light);
        }

        .edit-tools {
            display: none;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        body.edit-mode .edit-tools {
            display: flex;
        }

        .edit-btn {
            background: rgba(212, 175, 55, 0.3);
            border: none;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            color: var(--cream);
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        .add-memory {
            background: rgba(212, 175, 55, 0.2);
            border: 1px dashed var(--gold);
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
        }

        /* promise & forever button */
        .promise-text {
            font-size: 1.25rem;
            line-height: 1.7;
            font-style: italic;
            text-align: center;
            margin-bottom: 36px;
        }

        .btn-forever {
            background: transparent;
            border: 2px solid var(--gold);
            padding: 12px 36px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: var(--gold);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-forever:hover {
            background: var(--gold);
            color: var(--dark);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        /* celebration modal */
        .modal-celebrate {
            position: fixed;
            inset: 0;
            background: rgba(3, 1, 2, 0.9);
            backdrop-filter: blur(16px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            animation: fadeIn 0.4s;
        }

        .modal-celebrate.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                backdrop-filter: blur(0);
            }

            to {
                opacity: 1;
                backdrop-filter: blur(16px);
            }
        }

        .cel-ring {
            font-size: 100px;
            animation: bouncePop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes bouncePop {
            0% {
                transform: scale(0.2) rotate(-30deg);
                opacity: 0;
            }

            70% {
                transform: scale(1.2) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(0);
            }
        }

        .cel-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            background: linear-gradient(135deg, var(--gold-light), var(--rose-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0 12px;
        }

        .cel-sub {
            font-size: 1.2rem;
            font-style: italic;
        }

        .scroll-hint {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--gold);
            animation: bounceHint 2s infinite;
            margin-top: 8px;
        }

        @keyframes bounceHint {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            50% {
                transform: translateY(6px);
                opacity: 1;
            }
        }

        @media (max-width: 680px) {
            .glass-card {
                padding: 32px 24px;
            }

            .timeline-node {
                flex-direction: column;
                gap: 6px;
            }

            .timeline-year {
                min-width: auto;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <div class="bg-ambient"></div>
    <canvas id="sparkleCanvas"></canvas>

    <div class="content">
        <!-- ring hero -->
        <div class="ring-levitation" id="ringTrigger">
            <div class="ring-wrapper">
                <div class="ring-glow"></div>
                <span class="ring-emoji">💍✨</span>
            </div>
        </div>

        <!-- main proposal card -->
        <div class="glass-card">
            <div class="overture">a timeless question</div>
            <h1 id="heroTitle">Will You Marry Me,</h1>
            <div class="name-line" id="heroName">My Love?</div>
            <div class="divider">
                <div class="divider-line"></div><span class="divider-icon">❤️</span>
                <div class="divider-line"></div>
            </div>
            <p class="proposal-message" id="messageText"></p>
            <div class="button-group">
                <button class="btn-yes" id="yesBtn">Yes, Forever 💍</button>
                <button class="btn-no" id="noBtn">Maybe... yes 💕</button>
            </div>
        </div>

        <div class="scroll-hint">↓ scroll through our story ↓</div>

        <!-- timeline (journey) -->
        <div class="glass-card">
            <div class="overture">✦ our journey ✦</div>
            <div id="timelineContainer" class="timeline-grid"></div>
        </div>

        <!-- reasons to say yes -->
        <div class="glass-card">
            <div class="overture">💗 reasons to say yes 💗</div>
            <div id="reasonsGrid" class="reasons-container"></div>
        </div>

        <!-- memory gallery -->
        <div class="glass-card">
            <div class="overture">📸 treasured memories</div>
            <div id="galleryContainer" class="gallery-grid"></div>
            <div id="addMemoryWrapper" style="text-align: center;"></div>
        </div>

        <!-- promise & forever -->
        <div class="glass-card">
            <div class="overture">🤍 a vow from my heart</div>
            <p class="promise-text" id="promiseText"></p>
            <button class="btn-forever" id="startForeverBtn">Start Our Forever →</button>
        </div>
    </div>

    <!-- celebration modal -->
    <div id="celebrationModal" class="modal-celebrate">
        <div class="cel-ring">💍💖</div>
        <div class="cel-title">She said YES!</div>
        <div class="cel-sub" id="celSubMsg"></div>
        <button
            style="margin-top:32px; background:transparent; border:1px solid var(--gold); padding:8px 28px; border-radius:40px; color:var(--gold); cursor:pointer; font-family:'Cinzel';"
            onclick="closeModal()">begin forever →</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script>
        (function () {
            // ---------- language & user data ----------
            function getLang() {
                try {
                    const urlParam = new URLSearchParams(location.search).get('lang');
                    if (urlParam === 'hi' || urlParam === 'en') return urlParam;
                    return localStorage.getItem('greeter_lang') || 'en';
                } catch { return 'en'; }
            }
            const translations = {
                en: {
                    heroTitle: 'Will You Marry Me,',
                    story: 'From the moment you walked into my life, every day has felt like a beautiful dream I never want to wake from. You are my reason, my joy, my everything.',
                    wishes: 'The most beautiful answer to the most important question',
                    promiseText: 'I promise to love you, cherish you, and stand by you through every season of life. You are my today and all of my tomorrows. <strong>Forever yours, {name}.</strong>',
                    yesBtn: 'Yes, Forever 💍',
                    noBtn: 'Maybe... yes 💕',
                    startForever: 'Start Our Forever →',
                    celText: 'She said YES!',
                    timeline1: 'The Beginning',
                    timeline1text: 'The day our paths crossed, I knew something magical had begun.',
                    timeline2: 'First Adventure',
                    timeline2text: 'Every laugh, every glance, every shared dream — building our story.',
                    timeline3: 'Growing Together',
                    timeline3text: 'Through highs and lows, we only grew stronger and closer.',
                    timeline4: 'Today',
                    timeline4text: 'And now, I am ready to ask you the most important question of my life.',
                    reason1title: 'Love',
                    reason1text: 'You make my heart feel more alive than I ever thought possible.',
                    reason2title: 'Joy',
                    reason2text: 'Every day with you is filled with laughter and happiness.',
                    reason3title: 'Trust',
                    reason3text: 'I trust you completely, and you have my whole heart.',
                    reason4title: 'Future',
                    reason4text: 'I cannot imagine my future without you by my side.',
                    addMemory: '+ Add Memory',
                    upload: 'Upload',
                    remove: 'Remove'
                },
                hi: {
                    heroTitle: 'क्या तुम मुझसे शादी करोगी,',
                    story: 'जब से तुम मेरी जिंदगी में आई, हर दिन एक खूबसूरत ख्वाब बन गया जिससे मैं कभी जागना नहीं चाहता। तुम मेरी वजह, मेरी खुशी, मेरी सब कुछ हो।',
                    wishes: 'सबसे खूबसूरत जवाब सबसे महत्वपूर्ण सवाल का',
                    promiseText: 'मैं वादा करता हूँ कि तुमसे प्यार करूंगा, तुम्हारी देखभाल करूंगा, और जिंदगी के हर मौसम में तुम्हारे साथ खड़ा रहूंगा। तुम मेरी आज हो और मेरे सभी कल। <strong>हमेशा तुम्हारा, {name}.</strong>',
                    yesBtn: 'हाँ, हमेशा के लिए 💍',
                    noBtn: 'शायद... हाँ 💕',
                    startForever: 'हमारा हमेशा शुरू करें →',
                    celText: 'उसने हाँ कहा!',
                    timeline1: 'शुरुआत',
                    timeline1text: 'जिस दिन हमारे रास्ते मिले, मुझे पता चला कि कुछ जादुई शुरू हुआ।',
                    timeline2: 'पहला साहसिक कार्य',
                    timeline2text: 'हर हंसी, हर नजर, हर साझा ख्वाब — हमारी कहानी बनाना।',
                    timeline3: 'साथ बढ़ना',
                    timeline3text: 'ऊंचाई और गहराई के माध्यम से, हम और मजबूत और करीब हुए।',
                    timeline4: 'आज',
                    timeline4text: 'और अब, मैं अपने जीवन के सबसे महत्वपूर्ण सवाल पूछने के लिए तैयार हूँ।',
                    reason1title: 'प्यार',
                    reason1text: 'तुम मेरे दिल को इतना जीवंत महसूस कराती हो जितना मैंने कभी सोचा नहीं था।',
                    reason2title: 'खुशी',
                    reason2text: 'तुम्हारे साथ हर दिन हंसी और खुशी से भरा है।',
                    reason3title: 'भरोसा',
                    reason3text: 'मैं तुम पर पूरी तरह भरोसा करता हूँ, और तुम्हारे पास मेरा पूरा दिल है।',
                    reason4title: 'भविष्य',
                    reason4text: 'मैं अपने भविष्य को तुम्हारे बिना कल्पना नहीं कर सकता।',
                    addMemory: '+ याद जोड़ें',
                    upload: 'अपलोड',
                    remove: 'हटाएं'
                }
            };

            let lang = getLang();
            let t = translations[lang];
            const EDIT_MODE = (window.self !== window.top) && (new URLSearchParams(location.search).get('mode') === 'edit');
            if (EDIT_MODE) document.body.classList.add('edit-mode');

            let userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const userName = userData.name || (lang === 'hi' ? 'मेरी जान' : 'My Love');
            const storyMsg = userData.story || t.story;
            const wishesMsg = userData.wishes || t.wishes;
            let memories = userData.memories || [];

            // apply dynamic text
            function applyLanguage() {
                t = translations[lang];
                document.getElementById('heroTitle').innerText = t.heroTitle;
                document.getElementById('messageText').innerText = storyMsg;
                document.getElementById('promiseText').innerHTML = t.promiseText.replace('{name}', userName);
                document.getElementById('yesBtn').innerText = t.yesBtn;
                document.getElementById('noBtn').innerText = t.noBtn;
                document.getElementById('startForeverBtn').innerText = t.startForever;
                document.getElementById('celSubMsg').innerText = wishesMsg;
                renderTimeline();
                renderReasons();
                renderGallery();
            }

            document.getElementById('heroName').innerHTML = userName + ',';

            // timeline using memories or defaults
            function renderTimeline() {
                const container = document.getElementById('timelineContainer');
                container.innerHTML = '';
                let items = [];
                if (memories.length > 0) {
                    items = memories.map(m => ({ year: m.year || '✨', text: m.text || 'Beautiful moment' }));
                } else {
                    items = [
                        { year: t.timeline1, text: t.timeline1text },
                        { year: t.timeline2, text: t.timeline2text },
                        { year: t.timeline3, text: t.timeline3text },
                        { year: t.timeline4, text: t.timeline4text }
                    ];
                }
                items.forEach(item => {
                    const node = document.createElement('div');
                    node.className = 'timeline-node';
                    node.innerHTML = `<div class="timeline-year">${item.year}</div><div class="timeline-desc">${item.text}</div>`;
                    container.appendChild(node);
                });
            }

            // reasons flip cards
            function renderReasons() {
                const grid = document.getElementById('reasonsGrid');
                grid.innerHTML = '';
                const reasons = [
                    { icon: '❤️', title: t.reason1title, text: t.reason1text },
                    { icon: '😊', title: t.reason2title, text: t.reason2text },
                    { icon: '🤝', title: t.reason3title, text: t.reason3text },
                    { icon: '🌟', title: t.reason4title, text: t.reason4text }
                ];
                reasons.forEach(r => {
                    const flip = document.createElement('div');
                    flip.className = 'flip-card';
                    flip.innerHTML = `
                    <div class="flip-inner">
                        <div class="flip-front"><i>${r.icon}</i><strong>${r.title}</strong></div>
                        <div class="flip-back">${r.text}</div>
                    </div>
                `;
                    grid.appendChild(flip);
                });
            }

            function saveMemories() {
                userData.memories = memories;
                localStorage.setItem('userData', JSON.stringify(userData));
            }

            function renderGallery() {
                const galleryDiv = document.getElementById('galleryContainer');
                galleryDiv.innerHTML = '';
                memories.forEach((mem, idx) => {
                    const polaroid = document.createElement('div');
                    polaroid.className = 'memory-polaroid';
                    const imgDiv = document.createElement('div');
                    imgDiv.className = 'polaroid-img';
                    if (mem.img && mem.img.startsWith('data:image')) {
                        const img = document.createElement('img');
                        img.src = mem.img;
                        imgDiv.appendChild(img);
                    } else {
                        imgDiv.innerHTML = '📸✨';
                    }
                    const caption = document.createElement('div');
                    caption.className = 'polaroid-caption';
                    caption.innerText = mem.text || '♡';
                    polaroid.appendChild(imgDiv);
                    polaroid.appendChild(caption);

                    if (EDIT_MODE) {
                        const tools = document.createElement('div');
                        tools.className = 'edit-tools';
                        const uploadBtn = document.createElement('button');
                        uploadBtn.innerText = `📷 ${t.upload}`;
                        uploadBtn.className = 'edit-btn';
                        uploadBtn.onclick = (e) => {
                            e.stopPropagation();
                            const input = document.createElement('input');
                            input.type = 'file';
                            input.accept = 'image/*';
                            input.onchange = (ev) => {
                                const file = ev.target.files[0];
                                if (file) {
                                    const reader = new FileReader();
                                    reader.onload = (re) => {
                                        mem.img = re.target.result;
                                        saveMemories();
                                        renderGallery();
                                    };
                                    reader.readAsDataURL(file);
                                }
                            };
                            input.click();
                        };
                        const removeBtn = document.createElement('button');
                        removeBtn.innerText = `🗑️ ${t.remove}`;
                        removeBtn.className = 'edit-btn';
                        removeBtn.onclick = (e) => {
                            e.stopPropagation();
                            memories.splice(idx, 1);
                            saveMemories();
                            renderGallery();
                            renderTimeline();
                        };
                        tools.appendChild(uploadBtn);
                        tools.appendChild(removeBtn);
                        polaroid.appendChild(tools);
                    }
                    galleryDiv.appendChild(polaroid);
                });

                const addWrapper = document.getElementById('addMemoryWrapper');
                if (EDIT_MODE) {
                    addWrapper.innerHTML = '';
                    const addBtn = document.createElement('button');
                    addBtn.className = 'add-memory';
                    addBtn.innerText = t.addMemory;
                    addBtn.onclick = () => {
                        memories.push({ img: null, text: 'New memory', year: '✨' });
                        saveMemories();
                        renderGallery();
                        renderTimeline();
                    };
                    addWrapper.appendChild(addBtn);
                } else {
                    addWrapper.innerHTML = '';
                }
            }

            // floating sparkles animation (advanced)
            const canvas = document.getElementById('sparkleCanvas');
            let ctx = canvas.getContext('2d');
            let particles = [];
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Spark {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = 2 + Math.random() * 5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = 0.3 + Math.random() * 1.2;
                    this.alpha = 0.5 + Math.random() * 0.4;
                    this.color = `rgba(212, 175, 55, ${this.alpha})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y > canvas.height + 20) {
                        this.y = -20;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x < -20) this.x = canvas.width + 20;
                    if (this.x > canvas.width + 20) this.x = -20;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }
            for (let i = 0; i < 100; i++) particles.push(new Spark());
            function animateSparkles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateSparkles);
            }
            animateSparkles();

            // ring click triggers confetti
            document.getElementById('ringTrigger').addEventListener('click', () => {
                canvasConfetti({ particleCount: 80, spread: 100, origin: { y: 0.5 }, colors: ['#d4af37', '#c9184a', '#ffb3c1'] });
            });

            // yes button celebration
            const modal = document.getElementById('celebrationModal');
            function closeModal() { modal.classList.remove('show'); }
            window.closeModal = closeModal;

            document.getElementById('yesBtn').addEventListener('click', () => {
                modal.classList.add('show');
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        canvasConfetti({ particleCount: 200, spread: 110, origin: { y: 0.6, x: 0.2 + i * 0.3 }, colors: ['#d4af37', '#c9184a', '#ffb3c1', '#f5e2a0'], startVelocity: 20 });
                        canvasConfetti({ particleCount: 150, spread: 80, origin: { y: 0.4, x: 0.8 - i * 0.2 }, colors: ['#d4af37', '#c9184a'], startVelocity: 22 });
                    }, i * 180);
                }
            });

            // no button playful
            const noBtn = document.getElementById('noBtn');
            let noClickCount = 0;
            noBtn.addEventListener('click', () => {
                noClickCount++;
                if (noClickCount < 3) {
                    noBtn.innerText = ['💕 Are you sure?', 'Think again 💖', 'Yes is the only answer ✨'][noClickCount - 1];
                    noBtn.style.transform = 'scale(0.95)';
                    setTimeout(() => noBtn.style.transform = '', 200);
                } else {
                    document.getElementById('yesBtn').click();
                }
            });

            document.getElementById('startForeverBtn').addEventListener('click', () => {
                document.getElementById('yesBtn').click();
            });

            // language sync
            function syncLang() {
                const newLang = getLang();
                if (newLang !== lang) {
                    lang = newLang;
                    applyLanguage();
                    renderGallery(); // refresh texts in gallery buttons
                }
            }
            window.addEventListener('storage', syncLang);
            window.addEventListener('focus', syncLang);
            applyLanguage();
            renderGallery();
            renderTimeline();
        })();
    </script>
</body>

</html>
